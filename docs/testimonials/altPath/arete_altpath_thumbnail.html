<!DOCTYPE html>
<html lang="en">

<!--
  Built from docs/thumbnail-template/_TEMPLATE.html
  Per-thumbnail parts: custom gradient background + dot texture,
  "×" title accent, purple subtitle, 3 stat cards.
  FROZEN type (eyebrow / h1 / subtitle) is shared — do not edit.
-->

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>altPath x Potluck Tech Thumbnail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    /* ============ PER-THUMBNAIL KNOBS ============ */
    :root {
      --bg-image: none;
      --bg-fallback:
        radial-gradient(ellipse 34% 48% at 12% 26%, rgba(210, 184, 255, 0.40) 0, rgba(210, 184, 255, 0.18) 36%, rgba(210, 184, 255, 0) 68%),
        radial-gradient(ellipse 38% 44% at 88% 58%, rgba(182, 238, 224, 0.42) 0, rgba(182, 238, 224, 0.18) 38%, rgba(182, 238, 224, 0) 70%),
        radial-gradient(ellipse 30% 36% at 54% 76%, rgba(244, 232, 210, 0.28) 0, rgba(244, 232, 210, 0.12) 36%, rgba(244, 232, 210, 0) 66%),
        radial-gradient(ellipse 54% 26% at 50% 101%, rgba(182, 238, 224, 0.30) 0, rgba(182, 238, 224, 0.12) 42%, rgba(182, 238, 224, 0) 76%),
        linear-gradient(115deg, #f7f1ff 0%, #f9f5ef 50%, #f2fffb 100%);
      --scrim: none;
    }

    /* ============ FROZEN BRAND TOKENS (do not edit) ============ */
    :root {
      --ink: #171334;
      --ink-soft: rgba(21,17,31,0.82);
      --ink-muted: rgba(21,17,31,0.66);
      --accent: #5c2dc8;
      --accent-bright: #7a32e6;
      /* Type rule: body is ALWAYS Satoshi; Syne is TITLE-ONLY (h1). */
      --font-title: 'Syne', 'Helvetica Neue', Arial, sans-serif;
      --font-body: 'Satoshi', 'Helvetica Neue', Arial, sans-serif;
      --pad: 92px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      color: #1a1730;
    }

    .canvas {
      position: relative;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
      padding: var(--pad);
      background: var(--bg-image) center/cover no-repeat, var(--bg-fallback);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: var(--scrim);
    }

    /* per-thumbnail: dot texture overlay */
    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: radial-gradient(rgba(35, 26, 58, 0.08) 0.75px, transparent 0.75px);
      background-size: 18px 18px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }

    .content {
      position: absolute;
      z-index: 3;
      left: var(--pad);
      right: var(--pad);
      top: 46.5%; /* per-thumbnail: lifted for tall stat cards */
      transform: translateY(-50%);
      max-width: 1440px;
    }

    /* --- FROZEN: eyebrow --- */
    .eyebrow {
      position: relative;
      top: -72px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 96px;
      font-size: 34px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .eyebrow::before {
      content: "";
      width: 64px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
      display: block;
    }

    /* --- FROZEN: title --- */
    h1 {
      margin: 0;
      white-space: nowrap;
      font-size: 140px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 600;
      font-family: var(--font-title); /* the ONLY place Syne is used */
      color: var(--ink);
      -webkit-text-stroke: 3.5px var(--ink);
    }

    /* --- FROZEN: subtitle --- */
    .subtitle {
      margin-top: 66px;
      max-width: 1080px;
      font-size: 52px;
      line-height: 1.16;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--ink-soft);
    }

    /* per-thumbnail: title "×" accent + purple subtitle */
    .x {
      color: var(--accent-bright);
      -webkit-text-stroke: 0.75px var(--accent-bright);
      font-size: 1em;
      letter-spacing: -0.09em;
      padding: 0 0.03em;
    }

    .subtitle { white-space: nowrap; }
    .subtitle .purple { color: var(--accent-bright); }

    /* ============ BOTTOM BLOCK — stat cards ============ */
    .stats {
      position: absolute;
      z-index: 4;
      left: var(--pad);
      bottom: var(--pad);
      display: flex;
      justify-content: flex-start;
      gap: 80px;
    }

    .stat-card {
      width: 420px;
      min-height: 164px;
      border-radius: 28px;
      padding: 31px 34px 28px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(21,17,31,0.10);
      box-shadow: 0 22px 52px rgba(35,25,65,0.10);
      backdrop-filter: blur(18px);
    }

    .stat-value {
      font-size: 52px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-value span { color: rgba(21,17,31,0.42); margin: 0 0.08em; }

    .stat-label {
      margin-top: 14px;
      font-size: 24px;
      line-height: 1.24;
      letter-spacing: -0.02em;
      color: var(--ink-muted);
      font-weight: 520;
    }
  </style>
</head>

<body>
  <main class="canvas" role="img"
    aria-label="Case study thumbnail for altPath x Potluck Tech with product outcome results">
    <section class="content">
      <div class="eyebrow">Case Study</div>
      <h1>altPath <span class="x">×</span> Potluck Tech</h1>
      <p class="subtitle"><span class="purple">AI-Powered Career Platform</span></p>
    </section>

    <section class="stats" aria-label="Outcome stats">
      <div class="stat-card">
        <div class="stat-value">99% <span>&rarr;</span> 35%</div>
        <div class="stat-label">Bounce rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">10% <span>&rarr;</span> 75%</div>
        <div class="stat-label">Accounts with a saved career</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">8&times;</div>
        <div class="stat-label">Engagement vs. peer median</div>
      </div>
    </section>
  </main>
</body>

</html>
