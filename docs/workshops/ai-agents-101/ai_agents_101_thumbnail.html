<!DOCTYPE html>
<html lang="en">

<!--
  Built from docs/thumbnail-template/_TEMPLATE.html
  Per-thumbnail parts: bg.png background + meta line.
  FROZEN type (eyebrow / h1 / subtitle) is shared — do not edit.
-->

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Agents 101 Thumbnail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    /* ============ PER-THUMBNAIL KNOBS ============ */
    :root {
      --bg-image: url("bg.png");
      --bg-fallback: linear-gradient(120deg, #cfe6ef 0%, #dfe7e6 30%, #f4e3c4 62%, #f5dadf 100%);
      --scrim: linear-gradient(100deg, rgba(255,255,255,0.60) 0%, rgba(255,255,255,0.30) 36%, rgba(255,255,255,0) 64%);
    }

    /* ============ FROZEN BRAND TOKENS (do not edit) ============ */
    :root {
      --ink: #171334;
      --ink-soft: rgba(21,17,31,0.82);
      --ink-muted: rgba(21,17,31,0.66);
      --accent: #5c2dc8;
      --accent-bright: #7a32e6;
      /* Type rule: body is ALWAYS Satoshi; Syne is TITLE-ONLY (h1). */
      --font-title: 'Syne', 'Helvetica Neue', Arial, sans-serif;
      --font-body: 'Satoshi', 'Helvetica Neue', Arial, sans-serif;
      --pad: 92px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      color: #1a1730;
    }

    .canvas {
      position: relative;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
      padding: var(--pad);
      background: var(--bg-image) center/cover no-repeat, var(--bg-fallback);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: var(--scrim);
    }

    .content {
      position: absolute;
      z-index: 3;
      left: var(--pad);
      right: var(--pad);
      top: 46.5%;
      transform: translateY(-50%);
      max-width: 1500px;
    }

    /* --- FROZEN: eyebrow --- */
    .eyebrow {
      position: relative;
      top: -72px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 96px;
      font-size: 34px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .eyebrow::before {
      content: "";
      width: 64px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
      display: block;
    }

    /* --- FROZEN: title --- */
    h1 {
      margin: 0;
      white-space: nowrap;
      font-size: 140px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 600;
      font-family: var(--font-title); /* the ONLY place Syne is used */
      color: var(--ink);
      -webkit-text-stroke: 3.5px var(--ink);
    }

    /* --- FROZEN: subtitle --- */
    .subtitle {
      margin-top: 66px;
      max-width: 1080px;
      font-size: 52px;
      line-height: 1.16;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--ink-soft);
    }

    /* ============ BOTTOM BLOCK — meta line ============ */
    .meta {
      position: absolute;
      z-index: 3;
      left: var(--pad);
      bottom: var(--pad);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(26,23,48,0.60);
    }

    .meta .dot { color: var(--accent-bright); margin: 0 0.9em; }
  </style>
</head>

<body>
  <main class="canvas" role="img"
    aria-label="Workshop thumbnail: AI Agents 101 — Building AI Agents that Drive Real Results">
    <section class="content">
      <div class="eyebrow">Workshop</div>
      <h1>AI Agents 101</h1>
      <p class="subtitle">Building AI Agents that Drive Real Results</p>
    </section>
    <div class="meta">Learn 4 design patterns <span class="dot">·</span> Study a real agent <span class="dot">·</span> Build your own</div>
  </main>
</body>

</html>
