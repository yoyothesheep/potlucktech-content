<!DOCTYPE html>
<html lang="en">

<!--
  ============================================================
  POTLUCK TECH — THUMBNAIL TEMPLATE (1800 x 1000)
  ============================================================
  HOW TO USE
  1. Copy this whole folder (or just this file + a bg.png) to
     docs/<section>/<slug>/ and rename to <slug>_thumbnail.html
  2. Drop the background image next to it as `bg.png`
     (or change --bg-image below).
  3. Edit ONLY the three text strings in <body> (eyebrow / h1 / subtitle).
  4. Pick ONE bottom block: keep .meta OR .stats, delete the other.
  5. Screenshot at 1800x1000:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
       --headless --disable-gpu --hide-scrollbars \
       --force-device-scale-factor=1 --window-size=1800,1000 \
       --screenshot="out.png" "file://$PWD/<file>.html"

  DO NOT edit the FROZEN type styles (eyebrow / h1 / subtitle) —
  they are shared across all thumbnails for brand consistency.
  ============================================================
-->

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thumbnail Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    /* ============ PER-THUMBNAIL KNOBS (edit these) ============ */
    :root {
      /* Background: an image, a gradient, or both (image on top, gradient fallback). */
      --bg-image: url("bg.png");
      --bg-fallback: linear-gradient(120deg, #cfe6ef 0%, #dfe7e6 30%, #f4e3c4 62%, #f5dadf 100%);
      /* Left-side legibility scrim. Lighten/darken if the bg fights the text. */
      --scrim: linear-gradient(100deg, rgba(255,255,255,0.60) 0%, rgba(255,255,255,0.30) 36%, rgba(255,255,255,0) 64%);
    }

    /* ============ FROZEN BRAND TOKENS (do not edit) ============ */
    :root {
      --ink: #171334;              /* title fill + stroke */
      --ink-soft: rgba(21,17,31,0.82);   /* subtitle */
      --ink-muted: rgba(21,17,31,0.66);  /* eyebrow */
      --accent: #5c2dc8;           /* eyebrow bar */
      --accent-bright: #7a32e6;    /* dots / highlights */
      /* Type rule: body is ALWAYS Satoshi (set on <body>, inherited by
         everything). Syne is TITLE-ONLY — apply --font-title to h1 and
         nothing else. Don't put --font-title on subtitle, meta, or stats. */
      --font-title: 'Syne', 'Helvetica Neue', Arial, sans-serif;
      --font-body: 'Satoshi', 'Helvetica Neue', Arial, sans-serif;
      --pad: 92px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      color: #1a1730;
    }

    .canvas {
      position: relative;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
      padding: var(--pad);
      background: var(--bg-image) center/cover no-repeat, var(--bg-fallback);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: var(--scrim);
    }

    .content {
      position: absolute;
      z-index: 3;
      left: var(--pad);
      right: var(--pad);
      top: 46.5%; /* raised slightly above true center to balance the bottom block */
      transform: translateY(-50%);
      max-width: 1500px;
    }

    /* --- FROZEN: eyebrow --- */
    .eyebrow {
      position: relative;
      top: -72px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 96px;
      font-size: 34px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .eyebrow::before {
      content: "";
      width: 64px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
      display: block;
    }

    /* --- FROZEN: title --- */
    h1 {
      margin: 0;
      white-space: nowrap;
      font-size: 140px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 600;
      font-family: var(--font-title); /* the ONLY place Syne is used */
      color: var(--ink);
      -webkit-text-stroke: 3.5px var(--ink);
    }

    /* --- FROZEN: subtitle --- */
    .subtitle {
      margin-top: 66px;
      max-width: 1080px;
      font-size: 52px;
      line-height: 1.16;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--ink-soft);
    }

    /* ============ BOTTOM BLOCK — OPTION A: meta line ============ */
    .meta {
      position: absolute;
      z-index: 3;
      left: var(--pad);
      bottom: var(--pad);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(26,23,48,0.60);
    }

    .meta .dot { color: var(--accent-bright); margin: 0 0.9em; }

    /* ============ BOTTOM BLOCK — OPTION B: stat cards ============ */
    .stats {
      position: absolute;
      z-index: 4;
      left: var(--pad);
      right: var(--pad);
      bottom: var(--pad);
      display: flex;
      gap: 40px;
    }

    .stat-card {
      flex: 1;
      min-height: 164px;
      border-radius: 28px;
      padding: 31px 34px 28px;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(21,17,31,0.10);
      box-shadow: 0 22px 52px rgba(35,25,65,0.10);
      backdrop-filter: blur(18px);
    }

    .stat-value {
      font-size: 52px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-value span { color: rgba(21,17,31,0.42); margin: 0 0.08em; }

    .stat-label {
      margin-top: 14px;
      font-size: 24px;
      line-height: 1.24;
      letter-spacing: -0.02em;
      color: rgba(21,17,31,0.66);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main class="canvas" role="img" aria-label="EDIT: describe the thumbnail for accessibility">
    <section class="content">
      <div class="eyebrow">Eyebrow</div>
      <h1>Title Here</h1>
      <p class="subtitle">Subtitle goes here — one clear line.</p>
    </section>

    <!-- OPTION A — meta line (delete if using stat cards) -->
    <div class="meta">First phrase <span class="dot">·</span> Second phrase <span class="dot">·</span> Third phrase</div>

    <!-- OPTION B — stat cards (delete if using meta line)
    <section class="stats" aria-label="Outcome stats">
      <div class="stat-card">
        <div class="stat-value">99% <span>&rarr;</span> 35%</div>
        <div class="stat-label">Metric label</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">8&times;</div>
        <div class="stat-label">Metric label</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">10% <span>&rarr;</span> 75%</div>
        <div class="stat-label">Metric label</div>
      </div>
    </section>
    -->
  </main>
</body>

</html>
