<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>altPath x Potluck Tech Thumbnail</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
      background: #f7f4ef;
    }
    body {
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      color: #15111f;
    }
    .canvas {
      position: relative;
      width: 1800px;
      height: 1000px;
      overflow: hidden;
      padding: 92px 92px 86px;
      background:
        radial-gradient(ellipse 52% 78% at 8% 24%, rgba(210, 184, 255, 0.72) 0, rgba(210, 184, 255, 0.38) 38%, rgba(210, 184, 255, 0) 72%),
        radial-gradient(ellipse 58% 68% at 92% 62%, rgba(182, 238, 224, 0.76) 0, rgba(182, 238, 224, 0.42) 42%, rgba(182, 238, 224, 0) 76%),
        radial-gradient(ellipse 46% 56% at 52% 78%, rgba(244, 232, 210, 0.50) 0, rgba(244, 232, 210, 0.22) 40%, rgba(244, 232, 210, 0) 74%),
        linear-gradient(115deg, #f3ebff 0%, #f8f4ef 50%, #edfdf7 100%);
    }
    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(35, 26, 58, 0.08) 0.75px, transparent 0.75px);
      background-size: 18px 18px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }
    .chevron-field {
      position: absolute;
      right: -72px;
      top: 118px;
      width: 880px;
      height: 360px;
      z-index: 1;
      opacity: 0.40;
      filter: blur(1.25px);
      transform: rotate(0deg);
    }
    .chevron-field svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 30px 70px rgba(87, 43, 190, 0.10));
    }
    .chev-outline {
      fill: none;
      stroke: #5c2dc8;
      stroke-width: 8;
      stroke-linejoin: round;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }
    .chev-outline.c1 { opacity: 0.24; }
    .chev-outline.c2 { opacity: 0.36; }
    .chev-outline.c3 { opacity: 0.50; }
    .chev-outline.c4 { opacity: 0.64; }

    .content {
      position: absolute;
      z-index: 3;
      left: 92px;
      right: 92px;
      top: 46.5%;
      transform: translateY(-50%);
      max-width: 1440px;
    }
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 96px;
      font-size: 34px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(21,17,31,0.66);
    }
    .eyebrow::before {
      content: "";
      width: 118px;
      height: 5px;
      border-radius: 999px;
      background: #5c2dc8;
      display: block;
    }
    h1 {
      margin: 0;
      max-width: 1380px;
      font-size: 148px;
      line-height: 0.88;
      letter-spacing: -0.066em;
      font-weight: 950;
      color: #120d23;
    }
    .x {
      color: #7a32e6;
      letter-spacing: -0.09em;
      padding: 0 0.03em;
    }
    .subtitle {
      margin-top: 66px;
      max-width: 1080px;
      font-size: 64px;
      line-height: 1.16;
      letter-spacing: -0.036em;
      font-weight: 760;
      color: rgba(21,17,31,0.82);
    }
    .subtitle .purple { color: #7a32e6; }
    .stats {
      position: absolute;
      z-index: 4;
      left: 92px;
      right: 92px;
      bottom: 96px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
    }
    .stat-card {
      min-height: 164px;
      border-radius: 28px;
      padding: 31px 34px 28px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(21,17,31,0.10);
      box-shadow: 0 22px 52px rgba(35, 25, 65, 0.10);
      backdrop-filter: blur(18px);
    }
    .stat-value {
      font-size: 63px;
      line-height: 0.95;
      letter-spacing: -0.065em;
      font-weight: 950;
      color: #120d23;
      white-space: nowrap;
    }
    .stat-value span {
      color: rgba(21,17,31,0.42);
      margin: 0 0.08em;
    }
    .stat-label {
      margin-top: 14px;
      font-size: 24px;
      line-height: 1.24;
      letter-spacing: -0.02em;
      color: rgba(21,17,31,0.66);
      font-weight: 520;
    }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="Case study thumbnail for altPath x Potluck Tech with product outcome results">
    <div class="chevron-field" aria-hidden="true">
      <svg viewBox="0 0 880 360" role="presentation" focusable="false">
        <path class="chev-outline c1" d="M 24 62 H 388 Q 416 62 438 80 L 606 180 L 438 280 Q 416 298 388 298 H 24 L 188 180 Z" />
        <path class="chev-outline c2" d="M 124 62 H 488 Q 516 62 538 80 L 706 180 L 538 280 Q 516 298 488 298 H 124 L 288 180 Z" />
        <path class="chev-outline c3" d="M 224 62 H 588 Q 616 62 638 80 L 806 180 L 638 280 Q 616 298 588 298 H 224 L 388 180 Z" />
        <path class="chev-outline c4" d="M 324 62 H 688 Q 716 62 738 80 L 906 180 L 738 280 Q 716 298 688 298 H 324 L 488 180 Z" />
      </svg>
    </div>

    <section class="content">
      <div class="eyebrow">Case Study</div>
      <h1>altPath <span class="x">×</span> Potluck Tech</h1>
      <p class="subtitle"><span class="purple">AI-Powered Career Platform</span></p>
    </section>

    <section class="stats" aria-label="Outcome stats">
      <div class="stat-card">
        <div class="stat-value">99% <span>→</span> 35%</div>
        <div class="stat-label">Bounce rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">10% <span>→</span> 75%</div>
        <div class="stat-label">Accounts with a saved career</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">8×</div>
        <div class="stat-label">Engagement vs. peer median</div>
      </div>
    </section>
  </main>
</body>
</html>
